<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Six step contributor workflow</title>
  <desc id="desc">A horizontal workflow from domain markdown to PR review.</desc>
  <rect width="1200" height="600" fill="#000"/>
  <path d="M160 260h880" stroke="#fff" stroke-width="2"/>
  <g font-family="JetBrains Mono, Consolas, monospace" text-anchor="middle">
    <g fill="#000" stroke="#fff" stroke-width="2">
      <circle cx="160" cy="260" r="28"/><circle cx="336" cy="260" r="28"/><circle cx="512" cy="260" r="28"/><circle cx="688" cy="260" r="28"/><circle cx="864" cy="260" r="28"/>
    </g>
    <circle cx="1040" cy="260" r="29" fill="#60a5fa"/>
    <g fill="#fff" font-size="18" font-weight="700">
      <text x="160" y="267">1</text><text x="336" y="267">2</text><text x="512" y="267">3</text><text x="688" y="267">4</text><text x="864" y="267">5</text><text x="1040" y="267">6</text>
    </g>
    <g fill="#fff" font-size="16">
      <text x="160" y="345">DOMAIN .MD</text>
      <text x="336" y="345">SKILL .MD</text>
      <text x="512" y="345">WRITE TEST</text>
      <text x="688" y="345">UPDATE CLAUDE</text>
      <text x="864" y="345">SYNC INDEX</text>
      <text x="1040" y="345">PR REVIEW</text>
    </g>
  </g>
</svg>
