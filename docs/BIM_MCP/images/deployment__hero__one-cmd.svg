    <rect x="1205" y="560" width="130" height="70" fill="none" stroke="#fff" stroke-width="3"/><text x="1270" y="606" fill="#fff">R26</text>
  </g>
  <text x="800" y="760" fill="#fff" font-family="JetBrains Mono,Consolas,monospace" font-size="32" text-anchor="middle" letter-spacing="3">ONE COMMAND / FIVE REVIT VERSIONS</text>
</svg>
