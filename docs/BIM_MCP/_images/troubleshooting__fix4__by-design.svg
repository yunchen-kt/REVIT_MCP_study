  <rect x="38" y="135" width="130" height="82" fill="none" stroke="#fff" stroke-width="2"/>
  <rect x="232" y="135" width="130" height="82" fill="#60a5fa" stroke="#60a5fa" stroke-width="2"/>
  <path d="M168 176h56" stroke="#fff" stroke-width="3"/>
  <path d="M212 162l18 14-18 14" fill="none" stroke="#fff" stroke-width="3"/>
